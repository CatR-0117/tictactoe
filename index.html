<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container center">
      <div class="play-card">
        <div class="score">
          <div class="box x">PLAYER X<br /><span id="xScore">0</span></div>
          <div class="box draw">DRAW<br /><span id="drawScore">0</span></div>
          <div class="box o">PLAYER O<br /><span id="oScore">0</span></div>
        </div>
        <div class="grid" id="grid">
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
        </div>
        <button class="newgame" id="newgame">New game</button>
      </div>
    </div>

    <script src="./index.js"></script>
  </body>
</html>
